server {
  listen 80;
  server_name gmmx.app *.gmmx.app;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name gmmx.app *.gmmx.app;

  ssl_certificate /etc/letsencrypt/live/gmmx.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gmmx.app/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location / {
    proxy_pass http://gmmx-web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
